{{- if .Values.hiveInitJob.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: hive-create-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "all_objects_labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.hiveInitJob.initAnnotations | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        {{- include "all_objects_labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: common-space     
          emptyDir: {}   
        - name: java-cacerts-dir     
          emptyDir: {}
        - name: script-volume
          secret:
            secretName: hive-db-init-script
            defaultMode: 0755
        {{- if .Values.extraVolumes }}
          {{- tpl (toYaml .Values.extraVolumes) . | nindent 8 }}
        {{- end }}
        {{- range .Values.secretMounts}}
        - name: {{.name}}
          secret:
            secretName: {{.secretName}}
        {{- end}}
      containers:
      - name: hivemeta
        image: {{ template "hivemetastore_image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        command: ["/bin/bash"]
        resources: {{- toYaml .Values.hiveInitJob.resources | nindent 12 }}
        args: ["/opt/scripts/init-hive.sh"]
        volumeMounts:
          {{- if .Values.extraVolumeMounts }}
            {{- tpl (toYaml .Values.extraVolumeMounts) . | nindent 12 }}
          {{- end }}
          {{- range .Values.secretMounts}}
            - name: {{.name}}
              mountPath: {{.path}}
              subPath: {{.subPath}}
          {{- end }}
            - name: common-space     
              mountPath: /tmp   
            - name: java-cacerts-dir     
              mountPath: /java-security
              subPath: java-security
            - name: script-volume
              mountPath: /opt/scripts
      restartPolicy: Never
  backoffLimit: 5
{{- end }}
