{{- if .Values.hiveInitJob.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: hive-create-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "all_objects_labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.hiveInitJob.initAnnotations | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        {{- include "all_objects_labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: common-space     
          emptyDir: {}   
        - name: java-cacerts-dir     
          emptyDir: {}
        - name: db-credentials
          secret:
            secretName: {{ .Release.Name }}-db-job-credentials
        {{- if .Values.extraVolumes }}
          {{- tpl (toYaml .Values.extraVolumes) . | nindent 8 }}
        {{- end }}
        {{- range .Values.secretMounts}}
        - name: {{.name}}
          secret:
            secretName: {{.secretName}}
        {{- end}}
      containers:
      - name: hivemeta
        image: {{ template "hivemetastore_image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        command: ["/bin/bash"]
        resources: {{- toYaml .Values.hiveInitJob.resources | nindent 12 }}
        volumeMounts:
          {{- if .Values.extraVolumeMounts }}
            {{- tpl (toYaml .Values.extraVolumeMounts) . | nindent 12 }}
          {{- end }}
          {{- range .Values.secretMounts}}
            - name: {{.name}}
              mountPath: {{.path}}
              subPath: {{.subPath}}
          {{- end }}
            - name: common-space     
              mountPath: /tmp   
            - name: java-cacerts-dir     
              mountPath: /java-security
              subPath: java-security
            - name: db-credentials
              mountPath: /db-creds
              readOnly: true
        args:
          - "-c"
          - |-
            
            get_secret() { cat "/db-creds/$1"; }

            DB_USER=$(get_secret "db-user")
            DB_PASS=$(get_secret "db-password")
            PSQL_URL=$(get_secret "db-url")
            JDBC_URL=$(get_secret "jdbc-url")

            WRITABLE_CACERTS="/java-security/cacerts"
            ORIGINAL_CACERTS="${JAVA_HOME}/lib/security/cacerts"
            mkdir -p /java-security
            cp "${ORIGINAL_CACERTS}" "${WRITABLE_CACERTS}"
            export JAVA_TOOL_OPTIONS="${JAVA_TOOL_OPTIONS} -Djavax.net.ssl.trustStore=${WRITABLE_CACERTS} -Djavax.net.ssl.trustStorePassword=changeit"
            
            {{ if .Values.tls.enabled }}
            if [[ "$(ls ${TRUST_CERTS_DIR})" ]]; then
              for filename in ${TRUST_CERTS_DIR}/*; do
                echo "Import $filename certificate to Java cacerts"
                ${JAVA_HOME}/bin/keytool -import -trustcacerts -keystore "${WRITABLE_CACERTS}" -storepass changeit -noprompt -alias "$(basename ${filename})" -file "${filename}"
              done;
            fi
            {{- end }}
            
            {{ if .Values.hiveInitJob.cleanupDB }}
            
            echo -e "-----Clean Up DB-------"
            OUTPUT=$(psql "${PSQL_URL}" -c "drop database if exists {{ include "postgres.hive.db" . }} with (force);" 2>&1)
            EXIT_CODE=$?
            echo "Command output "$OUTPUT""
            
            if [ $EXIT_CODE -ne 0 ]
            then
              echo "ERROR: Could not drop the database in PG."
              exit 1
            else
              if [[ "$OUTPUT" == *"DROP DATABASE"* ]]
              then
                echo "Hive database has been successfully dropped"
              fi
            fi
            
            {{ end }}
            
            echo -e "\n-----Creating Hive user in PG-----"
            CREATE_USER_OUTPUT=$(psql "${PSQL_URL}" -c "create user ${DB_USER} with encrypted password '${DB_PASS}';" 2>&1)
            EXIT_CODE=$?
            echo "Command output $CREATE_USER_OUTPUT"

            if [ $EXIT_CODE -ne 0 ] && [[ "$CREATE_USER_OUTPUT" != *"role"*"already exists"* ]]
            then
              echo "ERROR: Could not create user in PG."
              exit 1
            else
              if [[ "$CREATE_USER_OUTPUT" == *"role"*"already exists"* ]]
              then
                echo "Hive user already exists."
              else
                if [[ "$CREATE_USER_OUTPUT" == *"CREATE ROLE"* ]]
                then
                  echo "Hive user has been successfully created"
                fi
              fi
            fi

            echo -e " \n-----Grant user in schema-----"
            GRANT_USER=$(psql "${PSQL_URL}" -c "grant usage on schema pg_catalog to ${DB_USER};" 2>&1)
            EXIT_CODE=$?
            echo "Command output $GRANT_USER"

            echo -e " \n-----Creating Hive DB in PG-----"
            CREATE_DB_OUTPUT=$(psql "${PSQL_URL}" -c "create database {{ include "postgres.hive.db" . }} owner ${DB_USER};" 2>&1)
            EXIT_CODE=$?
            echo "Command output $CREATE_DB_OUTPUT"

            if [ $EXIT_CODE -ne 0 ] && [[ "$CREATE_DB_OUTPUT" != *"database"*"already exists"* ]]
            then
              echo "ERROR: Could not create hive database in PG."
              printf %s "$CREATE_DB_OUTPUT"
              exit 1
            else
              if [[ "$CREATE_DB_OUTPUT" == *"database"*"already exists"* ]]
              then
                echo "Hive database already exists."
              else
                if [[ "$CREATE_DB_OUTPUT" == *"CREATE DATABASE"* ]]
                then
                  echo "Hive database has been successfully created"
                fi
              fi
            fi


            echo -e "\n-----Permissions Hive DB in PG-----"
            PERMISSIONS_DB_OUTPUT=$(psql "${PSQL_URL}" -c "grant all privileges on database {{ include "postgres.hive.db" . }} to ${DB_USER};" 2>&1)
            EXIT_CODE=$?
            echo -e "\n-----Permissions Hive DB updated-----"
            
            echo -e "\n-----Grants Hive DB in PG-----"
            GRANTS_DB_OUTPUT=$(psql "${PSQL_URL}" -c "alter database {{ include "postgres.hive.db" . }} owner to ${DB_USER};" 2>&1)
            EXIT_CODE=$?            
            echo -e "\n-----Grants Hive DB updated-----"

            {{ if .Values.hiveInitJob.upgradeSchema }}

            echo -e " \n----- Updating Hive Schema-----"
            HIVE_UPDATE_ERROR=$(/opt/hive-metastore/bin/schematool -verbose -upgradeSchema -dbType postgres -userName "${DB_USER}" -passWord "${DB_PASS}" -url "${JDBC_URL}" -driver {{ .Values.postgres.driver }} 2>&1 > /dev/null)
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]
            then
                echo "ERROR: Hive schema init failed."
                printf %s "$HIVE_UPDATE_ERROR"
                exit 1
            else
              echo "Hive schema has been successfully updated"
            fi

            {{ else }}

            echo -e " \n-----Initializing Hive Schema-----"
            HIVE_INIT_ERROR=$(/opt/hive-metastore/bin/schematool -verbose -initSchema -dbType postgres -userName "${DB_USER}" -passWord "${DB_PASS}" -url "${JDBC_URL}" -driver {{ .Values.postgres.driver }} 2>&1 > /dev/null)
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]
            then
              if [[ "$HIVE_INIT_ERROR" =~ .*"already exists".* ]]
              then
                echo "Hive schema is already initialized."
              else
                echo "ERROR: Hive schema init failed."
                printf %s "$HIVE_INIT_ERROR"
                exit 1
              fi
            else
              echo "Hive schema has been successfully initialized"
            fi

            {{ end }}

            echo -e " \n-----Validating Hive Schema-----"
            HIVE_VALID_ERROR=$(/opt/hive-metastore/bin/schematool -verbose -validate -dbType postgres -url "${JDBC_URL}" -driver {{ .Values.postgres.driver }} -userName "${DB_USER}" -passWord "${DB_PASS}" 2>&1)
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]
            then
              if [[ "$HIVE_VALID_ERROR" =~ .*"Failed in schema version validation".* ]] || [[ "$HIVE_VALID_ERROR" =~ .*"is not compatible".* ]]
              then 
                if [[ "$HIVE_VALID_ERROR" =~ .*"is not compatible".* ]]
                then
                  CURRENT_HIVE_VER=$(echo "$HIVE_VALID_ERROR" | grep "Hive Version:" | sed 's/.*Hive Version: \([^,]*\).*/\1/')
                  CURRENT_DB_VER=$(echo "$HIVE_VALID_ERROR" | grep "Database Schema Version:" | sed 's/.*Database Schema Version: \(.*\)/\1/')
                
                  echo "Schema version validation failed, current Database schema version is $CURRENT_DB_VER, hive version is $CURRENT_HIVE_VER, will try updating automatically ..."
                else
                  echo "Schema version validation failed, will try updating automatically ..."
                fi
                echo -e " \n-----Upgrading Hive Schema-----"
                HIVE_UPGRADE_SCHEMA=$(/opt/hive-metastore/bin/schematool  -verbose -upgradeSchema -dbType postgres -url "${JDBC_URL}" -driver {{ .Values.postgres.driver }} -userName "${DB_USER}" -passWord "${DB_PASS}" 2>&1 > /dev/null)
                EXIT_CODE=$?
                if [ $EXIT_CODE -ne 0 ]
                then
                  echo "ERROR: Hive schema upgrade failed."
                  printf %s "$HIVE_UPGRADE_SCHEMA"
                  exit 1
                else
                  echo "Hive Schema successfully upgraded."
                fi
              else
                echo "ERROR: Hive schema validation failed."
                printf %s "$HIVE_VALID_ERROR"
                exit 1
            fi
            else
              echo "Hive schema is valid"
            fi

      restartPolicy: Never
  backoffLimit: 5
{{- end }}
